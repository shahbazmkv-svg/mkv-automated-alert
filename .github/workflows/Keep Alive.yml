name: Keep Alive

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - fleet-availability
          - daily-leads
          - website-snapshot
          - pickup-alert
          - booking-bot
          - ads-snapshot
          - weekly-optimizer
          - gps-daily-report
          - gps2-etiqan
          - gps3-amber

permissions:
  contents: write

jobs:

  fleet-availability:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'fleet-availability' || github.event.inputs.job == 'all')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Fleet Availability
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
          TEST_MODE:       "false"
        run: python mkv_fleet_availability.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: fleet availability ran $(date +'%Y-%m-%d')"
          git push || true

  daily-leads:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'daily-leads' || github.event.inputs.job == 'all')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Daily Leads Report
        env:
          SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
          GALLABOX_API_KEY:    ${{ secrets.GALLABOX_API_KEY }}
          GALLABOX_API_SECRET: ${{ secrets.GALLABOX_API_SECRET }}
          GALLABOX_ACCOUNT_ID: ${{ secrets.GALLABOX_ACCOUNT_ID }}
          WEBHOOK_LEADS:       ${{ secrets.WEBHOOK_LEADS }}
          TEST_MODE:           "false"
        run: python mkv_gallabox_snapshot.py
      - name: Save MTD store and keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add mtd_store.json || true
          git diff --staged --quiet || git commit -m "chore: leads MTD store updated $(date +'%Y-%m-%d')"
          git push || true

  website-snapshot:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'website-snapshot' || github.event.inputs.job == 'all')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml pytz --break-system-packages
      - name: Run Website Snapshot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TEST_MODE:       "false"
        run: python mkv_website_monitor.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: website snapshot ran $(date +'%Y-%m-%d')"
          git push || true

  pickup-alert:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'pickup-alert' || github.event.inputs.job == 'all')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Pickup and Delivery Alert
        env:
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_URL:   ${{ secrets.SLACK_APP_URL }}
          TEST_MODE:       "false"
        run: python mkv_pickup_alert.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: pickup alert ran $(date +'%Y-%m-%d')"
          git push || true

  booking-bot:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'booking-bot' || github.event.inputs.job == 'all')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Fix store
        run: python3 fix_store.py
      - name: Run Booking Bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
          TEST_MODE:       "false"
        run: python mkv_booking_bot.py
      - name: Commit store updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add booking_thread_store.json || true
          git commit -m "chore: booking bot store $(date +'%Y-%m-%d %H:%M')" || true
          git push || true

  ads-snapshot:
    name: Daily Ads Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'ads-snapshot' || github.event.inputs.job == 'all')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run Daily Ads Report
        env:
          SLACK_BOT_TOKEN:              ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN:   ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:         ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:     ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:     ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID:       ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GMAIL_ADDRESS:                ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}
          META_TOKEN:                   ${{ secrets.META_TOKEN }}
          TEST_MODE:                    "false"
        run: python mkv_ads_api_report.py

  weekly-optimizer:
    name: Weekly Optimizer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'weekly-optimizer' || github.event.inputs.job == 'all')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Restore weekly store
        uses: actions/cache@v4
        with:
          path: mkv_weekly_store.json
          key: mkv-weekly-store-${{ github.run_id }}
          restore-keys: |
            mkv-weekly-store-
      - name: Run Weekly Optimizer
        env:
          SLACK_BOT_TOKEN:              ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN:   ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:         ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:     ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:     ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID:       ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GALLABOX_ACCOUNT_ID:          ${{ secrets.GALLABOX_ACCOUNT_ID }}
          GALLABOX_API_KEY:             ${{ secrets.GALLABOX_API_KEY }}
          GALLABOX_API_SECRET:          ${{ secrets.GALLABOX_API_SECRET }}
          META_TOKEN:                   ${{ secrets.META_TOKEN }}
          TEST_MODE:                    "false"
        run: python mkv_weekly_optimizer.py
      - name: Save weekly store
        if: always()
        uses: actions/cache@v4
        with:
          path: mkv_weekly_store.json
          key: mkv-weekly-store-${{ github.run_id }}

  gps-daily-report:
    name: GPS1 Pilot Daily Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'gps-daily-report' || github.event.inputs.job == 'all')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests openpyxl python-dotenv --break-system-packages
      - name: Run GPS1 Pilot Daily Report
        env:
          PILOT_USER:    ${{ secrets.PILOT_USER }}
          PILOT_PASS:    ${{ secrets.PILOT_PASS }}
          SLACK_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: "C0B6Y6EG85D"
        run: python gps1_pilot.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: gps1 pilot report ran $(date +'%Y-%m-%d')"
          git push || true

  gps2-etiqan:
    name: GPS2 AL ETIQAN Daily Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'gps2-etiqan' || github.event.inputs.job == 'all')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
      - name: Install Python deps
        run: pip install requests openpyxl python-dotenv selenium webdriver-manager --break-system-packages
      - name: Restore odometer snapshot
        uses: actions/cache@v4
        with:
          path: gps2_etiqan_snapshot.json
          key: gps2-snapshot-${{ github.run_id }}
          restore-keys: |
            gps2-snapshot-
      - name: Run GPS2 AL ETIQAN Report
        env:
          ETIQAN_USER:   ${{ secrets.ETIQAN_USER }}
          ETIQAN_PASS:   ${{ secrets.ETIQAN_PASS }}
          SLACK_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: "C0B6Y6EG85D"
        run: python gps2_etiqan.py
      - name: Save odometer snapshot
        if: always()
        uses: actions/cache@v4
        with:
          path: gps2_etiqan_snapshot.json
          key: gps2-snapshot-${{ github.run_id }}
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: gps2 etiqan report ran $(date +'%Y-%m-%d')"
          git push || true

  gps3-amber:
    name: GPS3 AmberConnect Daily Report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'gps3-amber' || github.event.inputs.job == 'all')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests openpyxl python-dotenv --break-system-packages
      - name: Restore odometer snapshot
        uses: actions/cache@v4
        with:
          path: gps3_amber_snapshot.json
          key: gps3-snapshot-${{ github.run_id }}
          restore-keys: |
            gps3-snapshot-
      - name: Run GPS3 AmberConnect Report
        env:
          AMBER_FLEET_ID: "0370168"
          AMBER_USER:     "muneer-fleet@mkvluxury.com"
          AMBER_PASS:     ${{ secrets.AMBER_PASS }}
          AMBER_SESSION:  ${{ secrets.AMBER_SESSION }}
          SLACK_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL:  "C0B6Y6EG85D"
        run: python gps3_amber.py
      - name: Save odometer snapshot
        if: always()
        uses: actions/cache@v4
        with:
          path: gps3_amber_snapshot.json
          key: gps3-snapshot-${{ github.run_id }}
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: gps3 amber report ran $(date +'%Y-%m-%d')"
          git push || true
