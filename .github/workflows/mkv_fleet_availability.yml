name: MKV Fleet Availability Post

on:
  schedule:
    - cron: '0 6 * * *'   # 10:00 AM Dubai time (UTC+4) daily
  workflow_dispatch:        # Manual trigger anytime

jobs:
  fleet-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Run Fleet Availability Post
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_API_KEY:   ${{ secrets.APPIC_API_KEY }}
        run: python mkv_fleet_availability.py
