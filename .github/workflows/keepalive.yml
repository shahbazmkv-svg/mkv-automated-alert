name: Keep Alive

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - fleet-availability
          - daily-leads
          - website-snapshot
          - pickup-alert
          - booking-bot

jobs:

  fleet-availability:
    if: github.event.inputs.job == 'fleet-availability' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Debug fleet APIs
        env:
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, json, requests
          from datetime import datetime, timezone, timedelta
          APPIC_KEY    = os.environ["APPIC_KEY"]
          SLACK_TOKEN  = os.environ["SLACK_BOT_TOKEN"]
          DUBAI_TZ     = timezone(timedelta(hours=4))
          today        = datetime.now(DUBAI_TZ).strftime("%Y-%m-%d")
          HEADERS      = {"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"}
          def post(text):
              requests.post("https://slack.com/api/chat.postMessage", headers=HEADERS,
                  json={"channel": "C0B0TGBDCDU", "text": text}, timeout=10)
          report = f"*Fleet API Debug — {today}*\n\n"
          r = requests.post("https://www.appicfleet.com/appiccar-apis-mkv/get-mkv-vehicles.php",
              data={"key": APPIC_KEY}, timeout=20)
          data = r.json()
          vehicles = data if isinstance(data, list) else data.get("data", data.get("vehicles", []))
          report += f"*Vehicles API — total: {len(vehicles)}*\n"
          str_fleet = [v for v in vehicles if float(v.get("dailyrent", 0) or 0) > 0]
          report += f"dailyrent > 0: {len(str_fleet)}\n"
          if vehicles:
              report += "First vehicle fields:\n```\n"
              for k, v in list(vehicles[0].items())[:20]:
                  report += f"  {k:<25}: {v}\n"
              report += "```\n"
          cats = {}
          for v in vehicles:
              for field in ["category","vehicleType","type","contractType","assignedAs"]:
                  val = str(v.get(field, "") or "").strip()
                  if val:
                      cats[f"{field}={val}"] = cats.get(f"{field}={val}", 0) + 1
          report += f"Categories: {json.dumps(cats, indent=2)}\n\n"
          lookback  = (datetime.now(DUBAI_TZ) - timedelta(days=1)).strftime("%Y-%m-%d")
          lookahead = (datetime.now(DUBAI_TZ) + timedelta(days=1)).strftime("%Y-%m-%d")
          r2 = requests.post("https://www.appicfleet.com/appiccar-apis-mkv/get-mkv-bookings.php",
              data={"key": APPIC_KEY, "startDate": lookback, "endDate": lookahead}, timeout=20)
          bookings = r2.json().get("bookings", [])
          active = [b for b in bookings if (b.get("status") or "").lower() not in
              {"cancelled","canceled","voided","void","deleted","closed"}]
          deliver = [b for b in active if b.get("startDate") == today]
          returns = [b for b in active if b.get("endDate") == today]
          report += f"*Bookings API — today ({today}):*\n"
          report += f"  Active in window: {len(active)}\n"
          report += f"  Deliveries today: {len(deliver)}\n"
          report += f"  Returns today   : {len(returns)}\n"
          if bookings:
              report += "First booking fields:\n```\n"
              for k, v in list(bookings[0].items())[:15]:
                  report += f"  {k:<25}: {v}\n"
              report += "```\n"
          print(report)
          post(report)
          print("Posted to #mkvtest")
          PYEOF
      - name: Run Fleet Availability
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
        run: python mkv_fleet_availability.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: fleet availability ran $(date +'%Y-%m-%d')"
          git push

  daily-leads:
    if: github.event.inputs.job == 'daily-leads' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Daily Leads Report
        env:
          SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
          GALLABOX_API_KEY:    ${{ secrets.GALLABOX_API_KEY }}
          GALLABOX_API_SECRET: ${{ secrets.GALLABOX_API_SECRET }}
          GALLABOX_ACCOUNT_ID: ${{ secrets.GALLABOX_ACCOUNT_ID }}
          WEBHOOK_LEADS:       ${{ secrets.WEBHOOK_LEADS }}
        run: python mkv_gallabox_snapshot.py
      - name: Save MTD store and keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add mtd_store.json
          git diff --staged --quiet || git commit -m "chore: leads + MTD store updated $(date +'%Y-%m-%d')"
          git push || true

  website-snapshot:
    if: github.event.inputs.job == 'website-snapshot' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml pytz --break-system-packages
      - name: Run Website Snapshot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python mkv_website_monitor.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: website snapshot ran $(date +'%Y-%m-%d')"
          git push

  pickup-alert:
    if: github.event.inputs.job == 'pickup-alert' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Pickup & Delivery Alert
        env:
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python mkv_pickup_alert.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: pickup alert ran $(date +'%Y-%m-%d')"
          git push

  booking-bot:
    if: github.event.inputs.job == 'booking-bot' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Fix store
        run: python3 fix_store.py
      - name: Run Booking Bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
        run: python mkv_booking_alert.py
      - name: Commit store updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add booking_thread_store.json || true
          git pull --rebase origin main || true
          git commit -m "chore: booking bot store $(date +'%Y-%m-%d %H:%M')" || true
          git push || git pull --rebase origin main && git push || true
