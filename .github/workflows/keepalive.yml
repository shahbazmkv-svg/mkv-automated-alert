name: Keep Alive

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - fleet-availability
          - daily-leads
          - website-snapshot
          - pickup-alert
          - booking-bot
          - ads-snapshot

permissions:
  contents: write

jobs:

  fleet-availability:
    if: github.event.inputs.job == 'fleet-availability' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Fleet Availability
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
        run: python mkv_fleet_availability.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: fleet availability ran $(date +'%Y-%m-%d')"
          git push

  daily-leads:
    if: github.event.inputs.job == 'daily-leads' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Daily Leads Report
        env:
          SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
          GALLABOX_API_KEY:    ${{ secrets.GALLABOX_API_KEY }}
          GALLABOX_API_SECRET: ${{ secrets.GALLABOX_API_SECRET }}
          GALLABOX_ACCOUNT_ID: ${{ secrets.GALLABOX_ACCOUNT_ID }}
          WEBHOOK_LEADS:       ${{ secrets.WEBHOOK_LEADS }}
        run: python mkv_gallabox_snapshot.py
      - name: Save MTD store and keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add mtd_store.json
          git diff --staged --quiet || git commit -m "chore: leads + MTD store updated $(date +'%Y-%m-%d')"
          git push || true

  website-snapshot:
    if: github.event.inputs.job == 'website-snapshot' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml pytz --break-system-packages
      - name: Run Website Snapshot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python mkv_website_monitor.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: website snapshot ran $(date +'%Y-%m-%d')"
          git push

  pickup-alert:
    if: github.event.inputs.job == 'pickup-alert' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Pickup & Delivery Alert
        env:
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python mkv_pickup_alert.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: pickup alert ran $(date +'%Y-%m-%d')"
          git push

  booking-bot:
    if: github.event.inputs.job == 'booking-bot' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Fix store
        run: python3 fix_store.py
      - name: Run Booking Bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
        run: python mkv_booking_alert.py
      - name: Commit store updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add booking_thread_store.json || true
          git pull --rebase origin main || true
          git commit -m "chore: booking bot store $(date +'%Y-%m-%d %H:%M')" || true
          git push || git pull --rebase origin main && git push || true

name: MKV Ads Automation

on:
  schedule:
    # ── Daily report: 09:30 UTC = 1:30 PM Dubai time (Mon–Sun)
    - cron: '30 9 * * *'
    # ── Weekly optimizer: 04:00 UTC = 08:00 AM Dubai time (Monday only)
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually?'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - both
      test_mode:
        description: 'TEST mode? (posts to #mkv-test-automation)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# ── Shared env vars used by both jobs ─────────────────────────────────────────
env:
  SLACK_BOT_TOKEN:              ${{ secrets.SLACK_BOT_TOKEN }}
  GOOGLE_ADS_DEVELOPER_TOKEN:   ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
  GOOGLE_ADS_CLIENT_ID:         ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
  GOOGLE_ADS_CLIENT_SECRET:     ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
  GOOGLE_ADS_REFRESH_TOKEN:     ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
  GOOGLE_ADS_CUSTOMER_ID:       ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
  GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
  GALLABOX_ACCOUNT_ID:          ${{ secrets.GALLABOX_ACCOUNT_ID }}
  GALLABOX_API_KEY:             ${{ secrets.GALLABOX_API_KEY }}
  GALLABOX_API_SECRET:          ${{ secrets.GALLABOX_API_SECRET }}
  META_TOKEN:                   ${{ secrets.META_TOKEN }}
  GMAIL_ADDRESS:                ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — DAILY ADS REPORT (runs every day at 1:30 PM Dubai)
  # ════════════════════════════════════════════════════════════════════════════
  daily-report:
    name: Daily Ads Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on the 09:30 cron OR manual trigger selecting daily/both
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 9 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'daily' || github.event.inputs.job == 'both'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Ads Report
        env:
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: python mkv_ads_api_report.py

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — WEEKLY OPTIMIZER (runs every Monday at 08:00 AM Dubai)
  # ════════════════════════════════════════════════════════════════════════════
  weekly-optimizer:
    name: Weekly Optimizer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run on the 04:00 Monday cron OR manual trigger selecting weekly/both
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'weekly' || github.event.inputs.job == 'both'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore WoW delta from previous Monday
      - name: Restore weekly store (WoW delta)
        uses: actions/cache@v4
        with:
          path: mkv_weekly_store.json
          key: mkv-weekly-store-${{ github.run_id }}
          restore-keys: |
            mkv-weekly-store-

      - name: Run Weekly Optimizer
        env:
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: python mkv_weekly_optimizer.py

      # Save updated WoW store for next Monday
      - name: Save weekly store
        if: always()
        uses: actions/cache@v4
        with:
          path: mkv_weekly_store.json
          key: mkv-weekly-store-${{ github.run_id }}
