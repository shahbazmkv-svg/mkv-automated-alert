name: Keep Alive

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - fleet-availability
          - daily-leads
          - website-snapshot
          - pickup-alert
          - booking-bot

jobs:

  fleet-availability:
    if: github.event.inputs.job == 'fleet-availability' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Fleet Availability
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
        run: python mkv_fleet_availability.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: fleet availability ran $(date +'%Y-%m-%d')"
          git push

  daily-leads:
    if: github.event.inputs.job == 'daily-leads' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Daily Leads Report
        env:
          SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
          GALLABOX_API_KEY:    ${{ secrets.GALLABOX_API_KEY }}
          GALLABOX_API_SECRET: ${{ secrets.GALLABOX_API_SECRET }}
          GALLABOX_ACCOUNT_ID: ${{ secrets.GALLABOX_ACCOUNT_ID }}
          WEBHOOK_LEADS:       ${{ secrets.WEBHOOK_LEADS }}
        run: python mkv_gallabox_snapshot.py
      - name: Save MTD store and keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add mtd_store.json
          git diff --staged --quiet || git commit -m "chore: leads + MTD store updated $(date +'%Y-%m-%d')"
          git push || true

  website-snapshot:
    if: github.event.inputs.job == 'website-snapshot' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml pytz --break-system-packages
      - name: Run Website Snapshot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python mkv_website_monitor.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: website snapshot ran $(date +'%Y-%m-%d')"
          git push

  pickup-alert:
    if: github.event.inputs.job == 'pickup-alert' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages
      - name: Run Pickup & Delivery Alert
        env:
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python mkv_pickup_alert.py
      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git commit --allow-empty -m "chore: pickup alert ran $(date +'%Y-%m-%d')"
          git push

  booking-bot:
    if: github.event.inputs.job == 'booking-bot' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz --break-system-packages

      - name: Fix store — mark past bookings closed
        run: |
          python3 -c "
import json, datetime
with open('booking_thread_store.json') as f:
    s = json.load(f)
today = datetime.datetime.now().strftime('%Y-%m-%d')
fixed = 0
for k, v in s['bookings'].items():
    e = v.get('end_date', '')
    if not isinstance(v, dict):
        continue
    if 'delivery_ts' not in v:       v['delivery_ts'] = None
    if 'pickup_ts' not in v:         v['pickup_ts'] = None
    if 'closed_ts' not in v:         v['closed_ts'] = None
    if 'extension_ts_list' not in v: v['extension_ts_list'] = []
    if e and e < today:
        if not v.get('closed'):
            v['closed'] = True
            fixed += 1
        v['pickup_alerted'] = True
with open('booking_thread_store.json', 'w') as f:
    json.dump(s, f, indent=2)
print(f'Store fix complete — {fixed} bookings marked closed')
"

      - name: Run Booking Bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APPIC_KEY:       ${{ secrets.APPIC_KEY }}
        run: python mkv_booking_alert.py

      - name: Commit store updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add booking_thread_store.json || true
          git pull --rebase origin main || true
          git commit -m "chore: booking bot store $(date +'%Y-%m-%d %H:%M')" || true
          git push || git pull --rebase origin main && git push || true
