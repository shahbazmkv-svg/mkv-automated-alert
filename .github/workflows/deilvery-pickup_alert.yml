name: MKV Pickup Alert

on:
  schedule:
    - cron: '0 15 * * *'   # 7:00 PM Dubai time (UTC+4 = 15:00 UTC)
  workflow_dispatch:

jobs:
  send-pickup-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Run Pickup Alert
        env:
          APPIC_KEY:        ${{ secrets.APPIC_KEY }}
          WEBHOOK_DELIVERY: ${{ secrets.WEBHOOK_DELIVERY }}
          WEBHOOK_PICKUP:   ${{ secrets.WEBHOOK_PICKUP }}
        run: python mkv_pickup_alert.py

      - name: Keep repo active (prevents GitHub disabling scheduled workflows)
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M UTC') | 7:00 PM Dubai" > .last_pickup_run
          git add .last_pickup_run
          git diff --staged --quiet || git commit -m "chore: pickup alert ran $(date -u '+%Y-%m-%d')"
          git push || true
