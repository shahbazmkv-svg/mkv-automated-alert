name: MKV Website Daily Snapshot

on:
  schedule:
    - cron: '0 7 * * *'   # Runs at 11:00 AM Dubai time (UTC+4 = 07:00 UTC)
  workflow_dispatch:        # Allow manual trigger anytime

jobs:
  website-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run Website Snapshot
        id: snapshot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python mkv_website_monitor.py
